<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Bambina - Suite Educativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --b-purple: #6A1B9A; --b-lila: #F3E5F5; }
        body { font-family: 'Quicksand', sans-serif; background-color: var(--b-lila); user-select: none; }
        .game-card { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .game-card:active { transform: scale(0.9); }
        .item-choice { transition: transform 0.2s; border-radius: 2rem; }
        .item-choice:active { transform: scale(0.95); background-color: #E1BEE7; }
    </style>
</head>
<body>

    <header class="p-8 text-center bg-white/40 border-b border-purple-100">
        <h1 class="text-5xl font-bold text-[#6A1B9A]">Bambina</h1>
        <p class="text-[#AB47BC] font-bold text-xs uppercase tracking-[0.2em]">Suite Educativa</p>
    </header>

    <main id="main-menu" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 p-6">
        </main>

    <div id="game-overlay" class="fixed inset-0 bg-[#F3E5F5] hidden flex-col z-50 overflow-y-auto">
        <div class="p-6 flex justify-between items-center sticky top-0 bg-[#F3E5F5]/90 backdrop-blur">
            <button onclick="closeGame()" class="bg-white p-4 rounded-full shadow-md text-[#6A1B9A] text-2xl font-bold">✕</button>
            <h2 id="game-title" class="text-[#6A1B9A] font-bold text-2xl uppercase"></h2>
            <div class="w-12"></div>
        </div>
        
        <div id="game-selection" class="grid grid-cols-2 gap-4 p-6 w-full max-w-4xl mx-auto">
            </div>
    </div>

    <script>
        const categories = [
            { id: 'animales', title: 'Granja Sonora', icon: '🐶', items: [
                { name: 'Perro', img: 'perro.png', sound: 'perro.mp3' },
                { name: 'Gato', img: 'gato.png', sound: 'gato.mp3' },
                { name: 'Vaca', img: 'vaca.png', sound: 'vaca.mp3' },
                { name: 'Pato', img: 'pato.png', sound: 'pato.mp3' }
            ], color: 'bg-[#6A1B9A]' },
            { id: 'numeros', title: 'Números 1-10', icon: '1️⃣', items: [
                { name: 'Uno', img: 'n1.png', sound: 'uno.mp3' },
                { name: 'Dos', img: 'n2.png', sound: 'dos.mp3' }
            ], color: 'bg-[#AB47BC]' },
            // ... agregar las otras 13 categorías siguiendo esta estructura
        ];

        const menu = document.getElementById('main-menu');
        const overlay = document.getElementById('game-overlay');
        const selectionGrid = document.getElementById('game-selection');

        function renderMenu() {
            categories.forEach(cat => {
                const card = document.createElement('div');
                card.className = `${cat.color} game-card p-8 rounded-[2.5rem] shadow-xl flex flex-col items-center text-white cursor-pointer`;
                card.innerHTML = `<span class="text-6xl mb-4">${cat.icon}</span><span class="font-bold text-sm uppercase">${cat.title}</span>`;
                card.onclick = () => openCategory(cat);
                menu.appendChild(card);
            });
        }

        function openCategory(cat) {
            document.getElementById('game-title').innerText = cat.title;
            selectionGrid.innerHTML = '';
            
            cat.items.forEach(item => {
                const div = document.createElement('div');
                div.className = `bg-white p-4 item-choice shadow-lg flex flex-col items-center border-4 border-transparent active:border-[#6A1B9A]`;
                div.innerHTML = `
                    <img src="assets/images/${item.img}" class="w-32 h-32 object-contain mb-2" onerror="this.src='https://via.placeholder.com/150?text=${item.name}'">
                    <p class="font-bold text-[#6A1B9A]">${item.name}</p>
                `;
                div.onclick = () => {
                    new Audio(`assets/audio/${item.sound}`).play();
                    // Efecto visual de rebote al tocar
                    div.style.transform = "scale(1.1)";
                    setTimeout(() => div.style.transform = "scale(1)", 200);
                };
                selectionGrid.appendChild(div);
            });

            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
        }

        function closeGame() {
            overlay.classList.add('hidden');
            overlay.classList.remove('flex');
        }

        renderMenu();
    </script>
</body>
</html>
