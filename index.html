<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bambina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #F3E5F5; margin: 0; overflow-x: hidden; user-select: none; }
        
        /* HEADER MENÚ PRINCIPAL */
        .main-header { padding: 15px 0; text-align: center; background: white; }
        .main-logo { max-width: 220px; margin: 0 auto; display: block; }
        .slogan { color: #AB47BC; font-size: 1rem; font-weight: 700; font-style: italic; margin-top: 8px; }

        /* GRID DE MENÚ */
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; padding: 20px; }
        .card { 
            height: 160px; border-radius: 45px; display: flex; align-items: flex-end; 
            justify-content: center; padding-bottom: 25px; color: white; 
            font-size: 11px; font-weight: bold; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(106, 27, 154, 0.1); 
        }

        /* OVERLAY DE JUEGO */
        #game-overlay { 
            position: fixed; inset: 0; background-color: #F3E5F5; 
            z-index: 1000; display: none; flex-direction: column; 
        }
        .overlay-header { 
            padding: 10px 20px; display: flex; align-items: center; 
            justify-content: space-between; background: white; 
        }
        .btn-close { 
            background: #F3E5F5; width: 45px; height: 45px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 20px; color: #6A1B9A; cursor: pointer;
        }

        /* ICONO SOLO (Arriba a la derecha) */
        .mini-icon { height: 35px; width: auto; }

        /* ESTILO CARDS ANIMALES (COMO EN TU CAPTURA) */
        .animal-card {
            background: white; border-radius: 35px; padding: 20px;
            text-align: center; box-shadow: 0 8px 15px rgba(0,0,0,0.04);
            transition: transform 0.2s;
        }
        .animal-card:active { transform: scale(0.95); }
        .animal-img { width: 100%; height: auto; border-radius: 20px; margin-bottom: 12px; }
    </style>
</head>
<body>

    <header id="nav-home" class="main-header">
        <img src="1000778888.png" alt="Bambina" class="main-logo">
        <p class="slogan">¡A jugar con tu bebé!</p>
    </header>

    <div class="game-grid">
        <div class="card" style="background-color: #6A1B9A;" onclick="openGame('Granja Sonora')">Granja Sonora</div>
        <div class="card" style="background-color: #AB47BC;" onclick="openGame('Números 1-10')">Números 1-10</div>
        <div class="card" style="background-color: #CE93D8;" onclick="openGame('Xilófono')">Xilófono</div>
        <div class="card" style="background-color: #6A1B9A;" onclick="openGame('Peek-a-boo')">Peek-a-boo</div>
    </div>

    <div id="game-overlay">
        <div class="overlay-header">
            <div class="btn-close" onclick="closeGame()">✕</div>
            <span id="game-title" style="color: #6A1B9A; font-weight: bold; font-size: 1.2rem;"></span>
            <img src="1000776005.png" class="mini-icon">
        </div>
        <div id="game-content" style="flex-grow: 1; padding: 20px; display: flex; justify-content: center; align-items: center;">
            </div>
    </div>

    <script>
        const assets = {
            'Perro': { img: 'assets/images/perro.png', snd: 'assets/audio/perro.mp3' },
            'Gato':  { img: 'assets/images/gato.png', snd: 'assets/audio/gato.mp3' },
            'Vaca':  { img: 'assets/images/vaca.png', snd: 'assets/audio/vaca.mp3' },
            'Pato':  { img: 'assets/images/pato.png', snd: 'assets/audio/pato.mp3' }
        };

        function openGame(title) {
            const content = document.getElementById('game-content');
            document.getElementById('game-title').innerText = title;
            
            if (title === 'Granja Sonora') {
                let html = '<div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%;">';
                for (let animal in assets) {
                    html += `
                        <div class="animal-card" onclick="playSound('${animal}')">
                            <img src="${assets[animal].img}" class="animal-img" onerror="this.src='https://via.placeholder.com/150?text=${animal}'">
                            <p style="color: #6A1B9A; font-weight: bold; font-size: 16px;">${animal}</p>
                        </div>`;
                }
                html += '</div>';
                content.innerHTML = html;
            } else {
                content.innerHTML = '<div class="animal-card"><p style="color: #AB47BC;">Pronto más diversión...</p></div>';
            }

            document.getElementById('game-overlay').style.display = 'flex';
            document.getElementById('nav-home').style.display = 'none';
        }

        function playSound(animal) {
            const audio = new Audio(assets[animal].snd);
            audio.play();
        }

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('nav-home').style.display = 'block';
        }
    </script>
</body>
</html>
